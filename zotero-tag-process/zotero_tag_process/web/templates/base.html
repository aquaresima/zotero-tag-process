<!DOCTYPE html>
<html lang="en">
<head>

  <title>{% block title %}Zotero Tag Process{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  {% block head %}{% endblock %}
</head>
<body class="bg-slate-50 text-slate-800">
  <nav class="bg-slate-900 text-slate-100 px-4 py-3 flex gap-1 items-center shadow">

</html>
